name: birthday_reminder
description: A beautiful Birthday Reminder App built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  phosphor_flutter: ^2.0.0
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # Utils
  uuid: ^4.2.1
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  flutter_contacts: ^1.1.7
  permission_handler: ^11.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_local_notifications: ^17.0.0
  file_picker: ^8.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Fonts - Geist Font Family
  # To use Geist font, download the font files from https://vercel.com/font
  # and place them in the fonts/ directory with the following naming:
  # - Geist-Regular.ttf
  # - Geist-Medium.ttf
  # - Geist-SemiBold.ttf
  # - Geist-Bold.ttf
  # Then uncomment the fonts section below:
  # fonts:
  #   - family: Geist
  #     fonts:
  #       - asset: fonts/Geist-Regular.ttf
  #         weight: 400
  #       - asset: fonts/Geist-Medium.ttf
  #         weight: 500
  #       - asset: fonts/Geist-SemiBold.ttf
  #         weight: 600
  #       - asset: fonts/Geist-Bold.ttf
  #         weight: 700

